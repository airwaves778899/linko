name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-and-import:
    name: Syntax check & import test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python syntax check
        run: |
          python -m py_compile main.py chat.py smoke_test.py
          echo "All Python files parsed successfully"

      - name: YAML parse config.yaml.example
        run: |
          python -c "import yaml; yaml.safe_load(open('config.yaml.example'))"
          echo "config.yaml.example parses correctly"

      - name: Import main without LINE credentials (lifespan refactor smoke check)
        env:
          # Intentionally empty so we exercise the import-time placeholder path.
          # If module import errors out without credentials, the lifespan
          # refactor regressed.
          LINE_CHANNEL_SECRET: ""
          LINE_CHANNEL_ACCESS_TOKEN: ""
          OPENAI_API_KEY: "dummy-not-real"
        run: |
          python -c "import main; print('main module imports cleanly without LINE credentials')"
